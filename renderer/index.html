<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' file:; img-src file: data: 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
    <title>vibes machine</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>vibes machine</h1>
      <span class="count" id="count">0 images</span>
      <div class="paste-zone" id="paste-zone" tabindex="0" contenteditable="true" spellcheck="false" aria-label="Paste image from clipboard">
        paste image here <kbd>⌘V</kbd>
      </div>
      <button class="cog" id="cog" type="button" aria-label="Choose screenshots folder" title="Choose screenshots folder">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/>
        </svg>
      </button>
    </header>

    <div class="empty" id="empty">
      no screenshots yet.<br />
      paste <kbd>⌘V</kbd> or drag images in.
    </div>
    <div class="grid" id="grid"></div>

    <div class="modal" id="modal" aria-hidden="true">
      <button class="close" aria-label="Close">&times;</button>
      <button class="nav prev" aria-label="Previous">&#8249;</button>
      <img id="modal-img" alt="" />
      <button class="nav next" aria-label="Next">&#8250;</button>
      <div class="caption" id="modal-caption"></div>
    </div>

    <div class="busy-overlay" id="busy-overlay" aria-hidden="true"></div>

    <div class="statusbar" id="statusbar" role="status" aria-live="polite"></div>

    <script src="main.js"></script>
  </body>
</html>
